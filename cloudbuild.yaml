steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_IMAGE_URL}:${SHORT_SHA}"
      - "-t"
      - "${_IMAGE_URL}:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_IMAGE_URL}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_APP_NAME}"
      - "--image=${_IMAGE_URL}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--port=80"
      - "--allow-unauthenticated"
      - "--cpu=1"
      - "--memory=256Mi"
      - "--min-instances=0"
      - "--max-instances=3"

images:
  - "${_IMAGE_URL}:${SHORT_SHA}"
  - "${_IMAGE_URL}:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-south1
  _APP_NAME: myprofile
  _IMAGE_URL: asia-south1-docker.pkg.dev/PROJECT_ID/myprofile/myprofile
